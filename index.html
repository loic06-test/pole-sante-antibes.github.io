<!-- Preload des URLs médias critiques mises en cache au précédent chargement.
     Au premier chargement, rien dans le cache → fonctionne normalement.
     Au 2e chargement et suivants, les images/vidéo s'affichent quasi instantanément. -->
<script>
(function(){
  try {
    var cached = JSON.parse(localStorage.getItem('psa_media_cache') || '{}');
    var head = document.head;
    function preload(url, as, type) {
      if (!url || typeof url !== 'string') return;
      var l = document.createElement('link');
      l.rel = 'preload'; l.as = as; l.href = url;
      if (type) l.type = type;
      l.setAttribute('fetchpriority', as === 'image' ? 'high' : 'low');
      l.crossOrigin = 'anonymous';
      head.appendChild(l);
    }
    if (cached.heroImage) preload(cached.heroImage, 'image');
    if (cached.bannerVideoUrl) preload(cached.bannerVideoUrl, 'video', 'video/mp4');
    // Photos médecins/kinés/infirmières
    if (cached.photoUrls && Array.isArray(cached.photoUrls)) {
      cached.photoUrls.slice(0, 12).forEach(function(u){ preload(u, 'image'); });
    }
  } catch(e) {}
})();
</script>

<!-- ⚠ Aucune protection web n'est infaillible (DevTools, capture d'écran...).
     Ces mesures découragent toutefois la copie casual et le téléchargement direct des photos. -->
<style>
  /* Désactiver la sélection de texte et les interactions tactiles indésirables sur tout le site */
  body {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;       /* iOS : pas de menu "Enregistrer l'image" sur appui long */
    -webkit-tap-highlight-color: transparent;
  }
  /* Empêcher la sélection des images et le drag (sauver l'image en la glissant) */
  img, picture, video {
    -webkit-user-drag: none;
    -khtml-user-drag: none;
    -moz-user-drag: none;
    -o-user-drag: none;
    user-drag: none;
    pointer-events: auto;
    -webkit-touch-callout: none;
  }
  /* Exception : autoriser la sélection et la saisie dans les champs de formulaire */
  input, textarea, select, [contenteditable="true"] {
    -webkit-user-select: text !important;
    -moz-user-select: text !important;
    -ms-user-select: text !important;
    user-select: text !important;
  }
</style>
<script>
(function() {
  'use strict';

  // 1. Bloquer le clic droit (menu contextuel : Copier, Enregistrer l'image, Inspecter...)
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    return false;
  }, true);

  // 2. Bloquer le drag des images
  document.addEventListener('dragstart', function(e) {
    if (e.target && e.target.tagName === 'IMG') {
      e.preventDefault();
      return false;
    }
  }, true);

  // 3. Bloquer les événements de copie / découpe
  ['copy', 'cut'].forEach(function(evt) {
    document.addEventListener(evt, function(e) {
      // Permettre la copie depuis les champs de formulaire
      var t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      e.preventDefault();
      return false;
    }, true);
  });

  // 4. Bloquer les raccourcis clavier sensibles
  document.addEventListener('keydown', function(e) {
    var t = e.target;
    var inField = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);

    // F12 — DevTools
    if (e.keyCode === 123) { e.preventDefault(); return false; }

    var ctrl = e.ctrlKey || e.metaKey; // metaKey = Cmd sur Mac

    if (ctrl) {
      // Ctrl+U : voir le code source
      if (e.keyCode === 85) { e.preventDefault(); return false; }
      // Ctrl+S : enregistrer la page
      if (e.keyCode === 83) { e.preventDefault(); return false; }
      // Ctrl+P : imprimer
      if (e.keyCode === 80) { e.preventDefault(); return false; }
      // Ctrl+A : sélectionner tout (sauf dans les champs)
      if (e.keyCode === 65 && !inField) { e.preventDefault(); return false; }
      // Ctrl+C / Ctrl+X (sauf dans les champs)
      if ((e.keyCode === 67 || e.keyCode === 88) && !inField) { e.preventDefault(); return false; }

      // Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C / Ctrl+Shift+K — DevTools (Chrome, Firefox)
      if (e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67 || e.keyCode === 75)) {
        e.preventDefault();
        return false;
      }
    }
  }, true);

  // 5. Empêcher la sélection à la souris (par sécurité, en complément du CSS)
  document.addEventListener('selectstart', function(e) {
    var t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    e.preventDefault();
    return false;
  }, true);

  // 6. Si quelqu'un parvient à copier malgré tout, écraser le presse-papier
  document.addEventListener('copy', function(e) {
    var t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    if (e.clipboardData) {
      e.clipboardData.setData('text/plain', '© Pôle Santé Antibes Centre — Reproduction interdite');
      e.preventDefault();
    }
  }, true);
})();
</script>

<style>
    /* Toutes les animations utilisent UNIQUEMENT opacity et transform pour rester sur le GPU.
       Pas de mix-blend-mode, pas de filter animé, pas de background-clip animé. */

    .psa-boot-loader {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: #faf8f4;
      transition: opacity 0.6s ease-out;
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
      /* Forcer un layer GPU dédié + isoler du reste du rendu (React notamment).
         contain:strict empêche les changements de layout extérieurs d'affecter ce sous-arbre. */
      transform: translateZ(0);
      will-change: opacity;
      contain: layout paint;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .psa-boot-loader.psa-boot-hide {
      opacity: 0;
      pointer-events: none;
    }

    /* Fond — halo doré subtil en bas (statique, fade-in seulement) */
    .psa-boot-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 100%, rgba(202,158,63,0.16) 0%, rgba(202,158,63,0.04) 40%, transparent 70%);
      opacity: 0;
      animation: psaBootFadeIn 0.8s ease-out 0.1s forwards;
      will-change: opacity;
    }

    .psa-boot-frame {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center;
      gap: 28px;
    }

    /* === Stage du logo === */
    .psa-boot-stage {
      position: relative; width: 220px; height: 220px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Croix médicale dorée — épaisseur fidèle au logo (~36% de la largeur de la croix).
       Croix = 60px de large, donc bras = 22px d'épaisseur.
       margin-top: -28px pour aligner pile sur la position de la croix dans le logo
       (mesurée précisément : la croix est à 27.7px au-dessus du centre du logo affiché à 200px).
       z-index: 2 pour être AU-DESSUS du logo pendant le crossfade. */
    .psa-boot-cross {
      position: absolute; top: 50%; left: 50%;
      width: 60px; height: 60px;
      margin-top: -28px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
      animation: psaBootCrossOut 0.35s ease-in 0.95s forwards;
      will-change: opacity, transform;
    }
    .psa-boot-cross-arm {
      position: absolute;
      background: #ca9e3f;
      border-radius: 1px;
    }
    .psa-boot-cross-v {
      top: 0; left: 50%;
      width: 22px;
      transform: translateX(-50%) scaleY(0);
      transform-origin: center;
      height: 100%;
      animation: psaBootCrossGrowV 0.55s cubic-bezier(0.65,0,0.35,1) 0.10s forwards;
      will-change: transform;
    }
    .psa-boot-cross-h {
      top: 50%; left: 0;
      height: 22px;
      width: 100%;
      transform: translateY(-50%) scaleX(0);
      transform-origin: center;
      animation: psaBootCrossGrowH 0.55s cubic-bezier(0.65,0,0.35,1) 0.40s forwards;
      will-change: transform;
    }
    @keyframes psaBootCrossGrowV {
      from { transform: translateX(-50%) scaleY(0); }
      to   { transform: translateX(-50%) scaleY(1); }
    }
    @keyframes psaBootCrossGrowH {
      from { transform: translateY(-50%) scaleX(0); }
      to   { transform: translateY(-50%) scaleX(1); }
    }
    @keyframes psaBootCrossOut {
      from { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      to   { opacity: 0; transform: translate(-50%,-50%) scale(0.9); }
    }

    /* Logo réel — apparition en simple fade-in (pas de scale qui forcerait un repaint
       au moment critique du décodage). Le breathing très subtil prend le relais après. */
    /* Logo réel — opacité 0.001 dès le début (techniquement visible donc décodé et
       composité immédiatement par le GPU avant que l'animation démarre). L'animation
       passe juste de 0.001 à 1, aucun nouveau travail GPU/paint requis au fade-in. */
    .psa-boot-logo {
      width: 200px; height: auto; display: block;
      opacity: 0.001;
      transform: translateZ(0);
      animation: psaBootLogoIn 0.6s ease-out 1.05s forwards,
                 psaBootBreath 5s ease-in-out 2.0s infinite;
      will-change: opacity, transform;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .psa-boot-logo-pic { display: contents; }
    @keyframes psaBootLogoIn {
      0%   { opacity: 0.001; }
      100% { opacity: 1; }
    }
    @keyframes psaBootBreath {
      0%, 100% { transform: translateZ(0) scale(1); }
      50%      { transform: translateZ(0) scale(1.015); }
    }

    /* === Texte === */
    .psa-boot-words {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px;
    }

    /* "Pôle Santé" en italique vert — pas de gradient animé (trop cher).
       Couleur unie + simple fade + slight slide. */
    .psa-boot-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 30px;
      color: #134524;
      line-height: 1;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: translateY(8px);
      animation: psaBootFadeUp 0.8s ease-out 1.65s forwards;
      will-change: opacity, transform;
    }
    .psa-boot-name em {
      font-style: italic;
      font-weight: 400;
    }
    @keyframes psaBootFadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Divider — petite ligne or — point or — petite ligne or */
    .psa-boot-divider {
      display: flex; align-items: center; gap: 10px;
      opacity: 0;
      transform: scale(0.85);
      animation: psaBootDividerIn 0.7s ease-out 1.95s forwards;
      will-change: opacity, transform;
    }
    .psa-boot-divider-line {
      display: block; width: 26px; height: 1px;
      background: linear-gradient(90deg, transparent, #ca9e3f);
    }
    .psa-boot-divider-line:last-child {
      background: linear-gradient(90deg, #ca9e3f, transparent);
    }
    .psa-boot-divider-dot {
      display: block; width: 4px; height: 4px;
      background: #ca9e3f; border-radius: 50%;
    }
    @keyframes psaBootDividerIn {
      to { opacity: 1; transform: scale(1); }
    }

    /* "ANTIBES CENTRE" */
    .psa-boot-place {
      font-family: 'Nunito', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #ca9e3f;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(4px);
      animation: psaBootPlaceIn 0.7s ease-out 2.15s forwards;
      will-change: opacity, transform;
    }
    @keyframes psaBootPlaceIn {
      to { opacity: 0.9; transform: translateY(0); }
    }

    /* Animation générique fade-in (utilisée par bg) */
    @keyframes psaBootFadeIn { to { opacity: 1; } }

    /* Préférences d'accessibilité — animations réduites */
    @media (prefers-reduced-motion: reduce) {
      .psa-boot-bg,
      .psa-boot-cross,
      .psa-boot-cross-arm,
      .psa-boot-logo,
      .psa-boot-name,
      .psa-boot-divider,
      .psa-boot-place {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
      .psa-boot-cross { display: none; }
    }

    /* Petits écrans */
    @media (max-width: 480px) {
      .psa-boot-stage { width: 180px; height: 180px; }
      .psa-boot-logo { width: 170px; }
      .psa-boot-cross { width: 51px; height: 51px; margin-top: -24px; }
      .psa-boot-cross-v { width: 18px; }
      .psa-boot-cross-h { height: 18px; }
      .psa-boot-name { font-size: 26px; }
      .psa-boot-place { font-size: 9px; letter-spacing: 0.16em; }
      .psa-boot-frame { gap: 22px; }
    }
  </style>

<div id="root"></div>

<!-- Bouton flottant Doctolib : toujours visible (hors React).
     Apparaît une fois le loader masqué pour ne pas perturber l'animation de boot.
     Source: https://imgur.com/7kADowD (avec fallback local en cas d'indisponibilité). -->
<a id="psa-doctolib-fab"
   href="https://www.doctolib.fr/pole-de-sante/antibes/pole-sante-antibes-centre"
   target="_blank"
   rel="noopener"
   aria-label="Prendre rendez-vous sur Doctolib"
   title="Prendre rendez-vous sur Doctolib">
  <img src="https://i.imgur.com/7kADowD.png"
       alt=""
       width="56"
       height="56"
       onerror="this.onerror=null;this.src='assets/doctolib.svg'" />
</a>

<style>
  #psa-doctolib-fab {
    position: fixed;
    bottom: 22px;
    right: 22px;
    z-index: 500;
    display: inline-block;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 4px 18px rgba(15,64,33,0.22), 0 1px 4px rgba(15,64,33,0.12);
    transition: transform 0.18s ease-out, box-shadow 0.18s ease-out, opacity 0.4s ease-out;
    -webkit-tap-highlight-color: transparent;
    /* Caché tant que le loader est affiché */
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px);
  }
  #psa-doctolib-fab.psa-fab-show {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
  #psa-doctolib-fab:hover {
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 6px 22px rgba(15,64,33,0.28), 0 2px 6px rgba(15,64,33,0.14);
  }
  #psa-doctolib-fab:active {
    transform: translateY(0) scale(1);
  }
  #psa-doctolib-fab img {
    width: 100%;
    height: 100%;
    display: block;
  }
  @media (max-width: 600px) {
    #psa-doctolib-fab {
      bottom: 18px;
      right: 18px;
      width: 52px;
      height: 52px;
    }
  }
</style>

<script>
  // Cache le loader UNIQUEMENT quand TOUT est prêt :
  // 1. React a monté (mutation détectée dans #root)
  // 2. Les polices web sont chargées (sinon le texte clignote en swap FOUT)
  // 3. Le layout s'est stabilisé (2 frames suspendues)
  // 4. Un délai minimum est passé pour que la chorégraphie se joue jusqu'au bout
  (function(){
    var loader = document.getElementById('psa-boot-loader');
    if (!loader) return;
    var startTime = Date.now();
    var hidden = false;

    function actuallyHide() {
      if (hidden) return;
      hidden = true;
      if (!loader || !loader.parentNode) return;
      loader.classList.add('psa-boot-hide');
      // Faire apparaître le bouton Doctolib en même temps que le loader fade out
      var fab = document.getElementById('psa-doctolib-fab');
      if (fab) fab.classList.add('psa-fab-show');
      setTimeout(function(){
        if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
      }, 600);
    }

    // Étape 1 : signaler que React a monté
    var reactMounted = false;
    function onReactMounted() {
      if (reactMounted) return;
      reactMounted = true;
      tryHide();
    }

    // Étape 2 : tenter de cacher quand TOUT est prêt
    function tryHide() {
      if (!reactMounted) return;
      // Attendre que les fonts soient chargées (si supporté)
      var fontsReady = document.fonts && document.fonts.ready
        ? document.fonts.ready
        : Promise.resolve();
      fontsReady.then(function(){
        // Attendre minimum 2000ms depuis le début pour la chorégraphie
        var elapsed = Date.now() - startTime;
        var minDisplay = 2000;
        var delay = Math.max(0, minDisplay - elapsed);
        setTimeout(function(){
          // Attendre 2 frames pour que le layout se soit complètement stabilisé
          requestAnimationFrame(function(){
            requestAnimationFrame(function(){
              actuallyHide();
            });
          });
        }, delay);
      });
    }

    // Observer le mount React
    var root = document.getElementById('root');
    if (root && window.MutationObserver) {
      var obs = new MutationObserver(function(muts){
        for (var i = 0; i < muts.length; i++) {
          if (muts[i].addedNodes && muts[i].addedNodes.length > 0) {
            obs.disconnect();
            onReactMounted();
            return;
          }
        }
      });
      obs.observe(root, { childList: true });
    }

    // Fallback : si rien ne se passe en 7s, cacher quand même
    setTimeout(function(){ reactMounted = true; actuallyHide(); }, 7000);
  })();
</script>
